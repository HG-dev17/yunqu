<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理后台 - 奖惩系统 (在线模式)</title>
    <link rel="stylesheet" href="css/style.css"> <!-- 复用主系统样式 -->
    <link rel="stylesheet" href="css/admin.css"> <!-- 引入本页专属样式 -->
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <style>
        .mode-switch {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .mode-btn {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background-color: #3498db;
            color: white;
        }
        .mode-btn:not(.active) {
            background-color: #ecf0f1;
            color: #7f8c8d;
        }
        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #2ecc71;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background-color: #2ecc71;
            color: white;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1001;
        }
        .notification.error {
            background-color: #e74c3c;
        }

        /* 编辑单元格样式 - 与离线模式保持一致 */
        .editable-table .editable {
            position: relative;
            cursor: pointer;
            min-height: 30px;
            display: table-cell;
        }
        .editable-table .editable:hover::after {
            content: '✎';
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            color: #7f8c8d;
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
        }
        .editable-table .editable.editing::after {
            content: none;
        }
        .editable-table .cell-edit-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
            box-sizing: border-box;
        }
        .editable-table .cell-edit-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        .editable-table .cell-edit-input[type="datetime-local"] {
            font-family: inherit;
        }
        .editable-table .cell-edit-input[type="number"] {
            width: 100%;
        }
        .editable-table .cell-edit-input textarea {
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }
        .editable-table .cell-edit-input select {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
            background-color: white;
            cursor: pointer;
        }

        /* 操作按钮样式 */
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-save-record {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #2ecc71;
            color: white;
        }
        .btn-cancel-edit {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #95a5a6;
            color: white;
        }
        .btn-delete-record {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #e74c3c;
            color: white;
        }
        .btn-save-record:hover,
        .btn-cancel-edit:hover,
        .btn-delete-record:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-database"></i> 数据管理后台</h1>
            <p class="subtitle">
                <span class="online-indicator"></span> 云衢中学 - 在线编辑模式
            </p>
            <p class="subtitle">
                <a href="index.html"><i class="fas fa-home"></i> 返回主系统</a> |
                <a href="all_semesters.html"><i class="fas fa-layer-group"></i> 查看汇总</a> |
                <a href="admin.html"><i class="fas fa-file-alt"></i> 切换到本地编辑模式</a>
            </p>
            <div class="online-info">
                <i class="fas fa-cloud"></i> 在线模式：所有修改将<strong>自动保存</strong>到服务器数据库，无需手动导出。
            </div>
        </header>

        <!-- 控制面板 -->
        <div class="controls-panel">
            <div class="panel-section">
                <h3><i class="fas fa-file-import"></i> 1. 选择数据源</h3>
                <div class="control-group">
                    <label for="semesterSelect">学期:</label>
                    <select id="semesterSelect" class="filter-select">
                        <option value="" disabled selected>加载学期列表中...</option>
                    </select>
                    <button id="loadDataBtn" class="control-btn primary">
                        <i class="fas fa-sync-alt"></i> 加载/重新加载
                    </button>
                </div>
                <div class="file-info" id="fileInfo">
                    <span>当前学期: <code id="currentSemester">未选择</code></span>
                    <span>记录总数: <strong id="totalRecords">0</strong></span>
                </div>
            </div>

            <div class="panel-section">
                <h3><i class="fas fa-edit"></i> 2. 数据操作</h3>
                <div class="button-group">
                    <button id="addRecordBtn" class="control-btn success" title="添加新记录">
                        <i class="fas fa-plus-circle"></i> 新增记录
                    </button>
                    <button id="exportSelectedBtn" class="control-btn" title="导出选中的记录为CSV">
                        <i class="fas fa-file-export"></i> 导出选中
                    </button>
                    <button id="deleteSelectedBtn" class="control-btn danger" title="删除选中的记录" disabled>
                        <i class="fas fa-trash-alt"></i> 删除选中
                    </button>
                    <button id="saveChangesBtn" class="control-btn primary" title="保存所有修改到服务器">
                        <i class="fas fa-cloud-upload-alt"></i> 保存修改
                    </button>
                    <button id="resetBtn" class="control-btn" title="重置为服务器最新数据">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                </div>
                <div class="hint">
                    <i class="fas fa-lightbulb"></i> 提示：双击表格单元格可直接编辑内容。修改后请点击"<strong>保存修改</strong>"按钮保存到服务器。
                </div>
            </div>

            <div class="panel-section">
                <h3><i class="fas fa-bullhorn"></i> 公告栏编辑</h3>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="announcementText">前台公告内容</label>
                    <textarea id="announcementText" class="form-control" rows="4" placeholder="请输入要显示在前台的公告内容..."></textarea>
                </div>

                <div class="button-group">
                    <button id="loadAnnouncementBtn" class="control-btn" title="重新加载公告">
                        <i class="fas fa-sync-alt"></i> 重新加载公告
                    </button>
                    <button id="saveAnnouncementBtn" class="control-btn primary" title="保存公告到服务器">
                        <i class="fas fa-save"></i> 保存公告
                    </button>
                </div>

                <div class="hint">
                    <i class="fas fa-info-circle"></i> 修改公告后请点击"<strong>保存公告</strong>"按钮，公告将立即在前台显示。
                </div>
            </div>

            <div class="panel-section">
                <h3><i class="fas fa-search"></i> 表格内筛选</h3>
                <div class="control-group">
                    <select class="filter-select" id="adminGradeFilter">
                        <option value="all">全部年级</option>
                        <option value="初一">初一</option>
                        <option value="初二">初二</option>
                        <option value="初三">初三</option>
                    </select>
                    <input type="text" id="tableSearchInput" placeholder="在已加载的表格中筛选" class="search-box-input">
                    <button id="clearSearchBtn" class="control-btn">
                        <i class="fas fa-times"></i> 清空
                    </button>
                </div>
            </div>
        </div>

        <!-- 主数据表格区域 -->
        <div class="data-section">
            <h3><i class="fas fa-table"></i> 数据表格
                <span class="badge" id="visibleCount">0</span> 行可见 / <span class="badge" id="loadedCount">0</span> 行已加载
            </h3>
            <div class="table-actions">
                <label class="checkbox-label">
                    <input type="checkbox" id="selectAllCheckbox" checked> 全选/反选
                </label>
                <div class="table-meta">
                    <span>最后加载: <span id="lastLoadTime">-</span></span>
                    <span id="unsavedWarning" style="color: #e74c3c; display: none;">
                        <i class="fas fa-exclamation-triangle"></i> 有未保存的修改
                    </span>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="dataTable" class="editable-table">
                    <thead>
                        <tr>
                            <th width="40px"><input type="checkbox" id="masterCheckbox"></th>
                            <th width="60px">年级</th>
                            <th width="60px">类型</th>
                            <th width="120px">人物</th>
                            <th>事项</th>
                            <th width="150px">时间</th>
                            <th width="120px">管理员</th>
                            <th width="100px">方式</th>
                            <th width="80px">分值</th>
                            <th width="100px">状态</th>
                            <th width="100px">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据行将通过JS动态生成 -->
                        <tr id="noDataRow">
                            <td colspan="11" style="text-align: center; padding: 40px; color: #7f8c8d;">
                                <i class="fas fa-database fa-2x" style="margin-bottom: 10px; display: block;"></i>
                                请先选择学期并点击"加载"。
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 新增记录表单 (模态框) -->
        <div id="addRecordModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-plus-circle"></i> 新增记录</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="newRecordForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newGrade">年级 <span class="required">*</span></label>
                                <select id="newGrade" class="form-control" required>
                                    <option value="">请选择年级</option>
                                    <option value="初一">初一</option>
                                    <option value="初二">初二</option>
                                    <option value="初三">初三</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="newType">类型 <span class="required">*</span></label>
                                <select id="newType" class="form-control" required>
                                    <option value="奖">奖 (奖励/表彰)</option>
                                    <option value="惩">惩 (批评/惩罚)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="newPerson">人物 <span class="required">*</span></label>
                                <input type="text" id="newPerson" class="form-control" placeholder="例如：张三" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="newDetail">事项描述 <span class="required">*</span></label>
                            <textarea id="newDetail" class="form-control" rows="3" placeholder="详细描述奖惩原因..." required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newDatetime">时间 <span class="required">*</span></label>
                                <input type="datetime-local" id="newDatetime" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="newAdmin">管理员/处理人</label>
                                <input type="text" id="newAdmin" class="form-control" placeholder="例如：李老师">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newMethod">奖惩方式</label>
                                <input type="text" id="newMethod" class="form-control" placeholder="例如：口头表扬、加分">
                            </div>
                            <div class="form-group">
                                <label for="newPoints">分值</label>
                                <input type="number" id="newPoints" class="form-control" placeholder="例如：5" step="0.5">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="newStatus">状态</label>
                            <select id="newStatus" class="form-control">
                                <option value="已处理">已处理</option>
                                <option value="处理中">处理中</option>
                                <option value="待处理">待处理</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="control-btn" id="cancelAddBtn">取消</button>
                    <button type="button" class="control-btn success" id="confirmAddBtn">添加记录</button>
                </div>
            </div>
        </div>

        <!-- 加载遮罩 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>

        <!-- 通知提示 -->
        <div class="notification" id="notification"></div>
    </div>

    <script src="js/admin_online.js"></script>
</body>
</html>
